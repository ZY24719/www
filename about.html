<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人智能仪表盘</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        .checkbox-wrapper input:checked + div {
            background-color: #10b981;
            border-color: #10b981;
        }
        
        .checkbox-wrapper input:checked + div svg {
            display: block;
        }
        
        .task-item.completed span {
            text-decoration: line-through;
            opacity: 0.6;
        }

        /* 动画 */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
    </style>
</head>
<body class="p-4 md:p-8 text-white overflow-x-hidden">

    <div class="max-w-7xl mx-auto">
        <!-- 顶部欢迎栏 -->
        <header class="mb-8 flex flex-col md:flex-row justify-between items-center animate-float">
            <div>
                <h1 class="text-4xl font-bold mb-2">你好, 探索者 👋</h1>
                <p class="text-white/80 text-lg" id="greeting-text">准备好开始新的一天了吗？</p>
            </div>
            <div class="mt-4 md:mt-0 text-right">
                <div class="text-5xl font-mono font-bold tracking-wider" id="clock">00:00:00</div>
                <div class="text-white/70 mt-1" id="date">加载中...</div>
            </div>
        </header>

        <!-- 主网格布局 -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

            <!-- 1. 专注计时器 (Pomodoro) -->
            <div class="glass-card rounded-3xl p-6 col-span-1 md:col-span-2 lg:col-span-1 flex flex-col justify-between h-80">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold"><i class="fas fa-hourglass-half mr-2"></i>专注计时器</h2>
                    <div class="flex space-x-2">
                        <button onclick="setTimer(25)" class="px-3 py-1 rounded-full bg-white/20 hover:bg-white/30 text-sm transition">25分</button>
                        <button onclick="setTimer(5)" class="px-3 py-1 rounded-full bg-white/20 hover:bg-white/30 text-sm transition">5分</button>
                    </div>
                </div>
                
                <div class="flex-1 flex items-center justify-center relative">
                    <!-- 圆形进度条背景 -->
                    <svg class="w-48 h-48 transform -rotate-90">
                        <circle cx="96" cy="96" r="88" stroke="rgba(255,255,255,0.1)" stroke-width="8" fill="none"></circle>
                        <circle id="progress-ring" cx="96" cy="96" r="88" stroke="white" stroke-width="8" fill="none" stroke-dasharray="553" stroke-dashoffset="0" stroke-linecap="round" class="transition-all duration-1000 ease-linear"></circle>
                    </svg>
                    <div class="absolute text-5xl font-bold font-mono" id="timer-display">25:00</div>
                </div>

                <div class="flex justify-center space-x-4 mt-4">
                    <button id="start-btn" onclick="toggleTimer()" class="w-12 h-12 rounded-full bg-white text-purple-600 hover:scale-110 transition flex items-center justify-center text-xl shadow-lg">
                        <i class="fas fa-play pl-1"></i>
                    </button>
                    <button onclick="resetTimer()" class="w-12 h-12 rounded-full bg-white/20 hover:bg-white/30 transition flex items-center justify-center text-xl">
                        <i class="fas fa-redo"></i>
                    </button>
                </div>
            </div>

            <!-- 2. 待办事项清单 -->
            <div class="glass-card rounded-3xl p-6 col-span-1 h-80 flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold"><i class="fas fa-check-circle mr-2"></i>今日任务</h2>
                    <span class="text-sm bg-white/20 px-2 py-1 rounded-lg" id="task-count">0/0</span>
                </div>
                
                <div class="flex-1 overflow-y-auto pr-2 custom-scrollbar" id="task-list">
                    <!-- 任务项将通过JS插入 -->
                </div>

                <div class="mt-4 relative">
                    <input type="text" id="new-task-input" placeholder="添加新任务..." 
                        class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-white/50 focus:outline-none focus:bg-white/20 transition"
                        onkeypress="handleTaskInput(event)">
                    <button onclick="addTask()" class="absolute right-2 top-2 p-1 hover:bg-white/20 rounded-lg transition">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
            </div>

            <!-- 3. 天气卡片 (模拟数据) -->
            <div class="glass-card rounded-3xl p-6 col-span-1 h-80 relative overflow-hidden group">
                <div class="absolute top-0 right-0 -mt-4 -mr-4 w-32 h-32 bg-yellow-400 rounded-full blur-3xl opacity-20 group-hover:opacity-40 transition duration-700"></div>
                
                <div class="flex justify-between items-start relative z-10">
                    <div>
                        <h2 class="text-xl font-semibold"><i class="fas fa-cloud-sun mr-2"></i>今日天气</h2>
                        <p class="text-white/60 text-sm mt-1">北京市, 中国</p>
                    </div>
                    <div class="text-right">
                        <div class="text-4xl font-bold">24°</div>
                        <div class="text-white/80">多云</div>
                    </div>
                </div>

                <div class="mt-8 flex justify-between items-center text-center">
                    <div class="bg-white/10 rounded-xl p-3 w-full mx-1">
                        <i class="fas fa-wind mb-2 text-blue-200"></i>
                        <div class="text-xs text-white/70">风速</div>
                        <div class="font-bold">12km/h</div>
                    </div>
                    <div class="bg-white/10 rounded-xl p-3 w-full mx-1">
                        <i class="fas fa-tint mb-2 text-blue-200"></i>
                        <div class="text-xs text-white/70">湿度</div>
                        <div class="font-bold">45%</div>
                    </div>
                    <div class="bg-white/10 rounded-xl p-3 w-full mx-1">
                        <i class="fas fa-eye mb-2 text-blue-200"></i>
                        <div class="text-xs text-white/70">能见度</div>
                        <div class="font-bold">10km</div>
                    </div>
                </div>

                <div class="mt-6">
                    <div class="flex justify-between text-sm text-white/70 mb-2">
                        <span>未来预报</span>
                    </div>
                    <div class="flex justify-between">
                        <div class="text-center">
                            <div class="text-xs mb-1">14:00</div>
                            <i class="fas fa-sun text-yellow-300"></i>
                            <div class="text-sm font-bold mt-1">26°</div>
                        </div>
                        <div class="text-center">
                            <div class="text-xs mb-1">16:00</div>
                            <i class="fas fa-cloud text-gray-300"></i>
                            <div class="text-sm font-bold mt-1">24°</div>
                        </div>
                        <div class="text-center">
                            <div class="text-xs mb-1">18:00</div>
                            <i class="fas fa-cloud-moon text-purple-300"></i>
                            <div class="text-sm font-bold mt-1">21°</div>
                        </div>
                        <div class="text-center">
                            <div class="text-xs mb-1">20:00</div>
                            <i class="fas fa-moon text-blue-200"></i>
                            <div class="text-sm font-bold mt-1">19°</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 4. 快捷工具区 -->
            <div class="glass-card rounded-3xl p-6 col-span-1 md:col-span-2 lg:col-span-3">
                <h2 class="text-xl font-semibold mb-4"><i class="fas fa-th-large mr-2"></i>快捷访问</h2>
                <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                    <a href="https://www.google.com" target="_blank" class="bg-white/10 hover:bg-white/20 rounded-2xl p-4 flex flex-col items-center justify-center transition transform hover:-translate-y-1 cursor-pointer">
                        <i class="fab fa-google text-3xl mb-2 text-red-400"></i>
                        <span class="text-sm">Google</span>
                    </a>
                    <a href="https://github.com" target="_blank" class="bg-white/10 hover:bg-white/20 rounded-2xl p-4 flex flex-col items-center justify-center transition transform hover:-translate-y-1 cursor-pointer">
                        <i class="fab fa-github text-3xl mb-2 text-gray-200"></i>
                        <span class="text-sm">GitHub</span>
                    </a>
                    <a href="https://www.bilibili.com" target="_blank" class="bg-white/10 hover:bg-white/20 rounded-2xl p-4 flex flex-col items-center justify-center transition transform hover:-translate-y-1 cursor-pointer">
                        <i class="fab fa-bilibili text-3xl mb-2 text-pink-400"></i>
                        <span class="text-sm">Bilibili</span>
                    </a>
                    <div onclick="toggleFullScreen()" class="bg-white/10 hover:bg-white/20 rounded-2xl p-4 flex flex-col items-center justify-center transition transform hover:-translate-y-1 cursor-pointer">
                        <i class="fas fa-expand text-3xl mb-2 text-green-400"></i>
                        <span class="text-sm">全屏模式</span>
                    </div>
                    <div onclick="changeTheme()" class="bg-white/10 hover:bg-white/20 rounded-2xl p-4 flex flex-col items-center justify-center transition transform hover:-translate-y-1 cursor-pointer">
                        <i class="fas fa-palette text-3xl mb-2 text-yellow-400"></i>
                        <span class="text-sm">切换主题</span>
                    </div>
                    <div onclick="alert('这是一个演示按钮')" class="bg-white/10 hover:bg-white/20 rounded-2xl p-4 flex flex-col items-center justify-center transition transform hover:-translate-y-1 cursor-pointer">
                        <i class="fas fa-calculator text-3xl mb-2 text-blue-400"></i>
                        <span class="text-sm">计算器</span>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- 1. 时钟功能 ---
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('zh-CN', { hour12: false });
            const dateString = now.toLocaleDateString('zh-CN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            
            document.getElementById('clock').textContent = timeString;
            document.getElementById('date').textContent = dateString;

            // 动态问候语
            const hour = now.getHours();
            let greeting = "你好";
            if (hour < 6) greeting = "夜深了，注意休息 🌙";
            else if (hour < 9) greeting = "早上好，开启元气满满的一天 ☀️";
            else if (hour < 12) greeting = "上午好，保持专注 💪";
            else if (hour < 14) greeting = "中午好，记得午休 🍱";
            else if (hour < 18) greeting = "下午好，继续加油 🚀";
            else greeting = "晚上好，享受宁静时光 ✨";
            
            document.getElementById('greeting-text').textContent = greeting;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- 2. 番茄钟逻辑 ---
        let timerInterval;
        let timeLeft = 25 * 60;
        let totalTime = 25 * 60;
        let isRunning = false;
        const circle = document.getElementById('progress-ring');
        const circumference = 2 * Math.PI * 88; // r=88

        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timer-display').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            // 更新圆环进度
            const offset = circumference - (timeLeft / totalTime) * circumference;
            circle.style.strokeDashoffset = offset;
        }

        function toggleTimer() {
            const btnIcon = document.querySelector('#start-btn i');
            if (isRunning) {
                clearInterval(timerInterval);
                isRunning = false;
                btnIcon.classList.remove('fa-pause');
                btnIcon.classList.add('fa-play');
                btnIcon.classList.add('pl-1');
            } else {
                isRunning = true;
                btnIcon.classList.remove('fa-play', 'pl-1');
                btnIcon.classList.add('fa-pause');
                timerInterval = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateTimerDisplay();
                    } else {
                        clearInterval(timerInterval);
                        isRunning = false;
                        alert("时间到！休息一下吧。");
                        btnIcon.classList.remove('fa-pause');
                        btnIcon.classList.add('fa-play');
                        btnIcon.classList.add('pl-1');
                    }
                }, 1000);
            }
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            timeLeft = totalTime;
            updateTimerDisplay();
            const btnIcon = document.querySelector('#start-btn i');
            btnIcon.classList.remove('fa-pause');
            btnIcon.classList.add('fa-play');
            btnIcon.classList.add('pl-1');
        }

        function setTimer(minutes) {
            clearInterval(timerInterval);
            isRunning = false;
            totalTime = minutes * 60;
            timeLeft = totalTime;
            updateTimerDisplay();
            const btnIcon = document.querySelector('#start-btn i');
            btnIcon.classList.remove('fa-pause');
            btnIcon.classList.add('fa-play');
            btnIcon.classList.add('pl-1');
        }

        // --- 3. 待办事项逻辑 ---
        let tasks = [
            { id: 1, text: "阅读技术文档 30 分钟", completed: false },
            { id: 2, text: "完成前端页面开发", completed: true },
            { id: 3, text: "健身运动", completed: false }
        ];

        function renderTasks() {
            const list = document.getElementById('task-list');
            list.innerHTML = '';
            let completedCount = 0;

            tasks.forEach(task => {
                if(task.completed) completedCount++;
                const div = document.createElement('div');
                div.className = `task-item flex items-center p-3 mb-2 bg-white/5 rounded-xl hover:bg-white/10 transition group ${task.completed ? 'completed' : ''}`;
                div.innerHTML = `
                    <label class="checkbox-wrapper cursor-pointer relative flex items-center">
                        <input type="checkbox" class="sr-only" ${task.completed ? 'checked' : ''} onchange="toggleTask(${task.id})">
                        <div class="w-5 h-5 border-2 border-white/50 rounded-md mr-3 flex items-center justify-center transition-colors">
                            <svg class="w-3 h-3 text-white hidden pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                        <span class="flex-1 text-sm">${task.text}</span>
                    </label>
                    <button onclick="deleteTask(${task.id})" class="opacity-0 group-hover:opacity-100 text-white/50 hover:text-red-400 transition ml-2">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                `;
                list.appendChild(div);
            });

            document.getElementById('task-count').textContent = `${completedCount}/${tasks.length}`;
        }

        function addTask() {
            const input = document.getElementById('new-task-input');
            const text = input.value.trim();
            if (text) {
                tasks.push({ id: Date.now(), text: text, completed: false });
                input.value = '';
                renderTasks();
            }
        }

        function handleTaskInput(e) {
            if (e.key === 'Enter') addTask();
        }

        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                renderTasks();
            }
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            renderTasks();
        }

        renderTasks();

        // --- 4. 工具函数 ---
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        const themes = [
            'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
            'linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%)',
            'linear-gradient(120deg, #84fab0 0%, #8fd3f4 100%)',
            'linear-gradient(120deg, #f093fb 0%, #f5576c 100%)',
            'linear-gradient(to right, #43e97b 0%, #38f9d7 100%)'
        ];
        let currentTheme = 0;
        function changeTheme() {
            currentTheme = (currentTheme + 1) % themes.length;
            document.body.style.background = themes[currentTheme];
        }

    </script>
</body>
</html>
